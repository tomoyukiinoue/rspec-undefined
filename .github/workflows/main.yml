name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "2.2"
          - "2.7"
          - "3.1"
          - "3.3"
    steps:
      - uses: actions/checkout@v4

      - name: Run tests in Ruby ${{ matrix.ruby }} container
        # container: ディレクティブを使わず docker run で実行する
        # (古い Debian ベースの ruby:2.2 等は actions/checkout@v4 の Node.js 要件と衝突するため)
        run: |
          docker run --rm \
            -v "$(pwd)":/gem:ro \
            -e LANG=C.UTF-8 \
            -e LC_ALL=C.UTF-8 \
            ruby:${{ matrix.ruby }} \
            bash -c '
              set -e
              cp -r /gem /tmp/work
              cd /tmp/work
              rm -f Gemfile.lock
              ruby -v
              if [ "${{ matrix.ruby }}" = "2.2" ]; then
                gem install bundler -v "< 2" --no-document
              fi
              bundle install --jobs=4 --retry=3
              bundle exec rspec
            '
